<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quy trình thi công - Sửa chữa cải tạo công trình dân dụng</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  
  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }

  .app { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 320px;
    min-width: 320px;
    background: #1e293b;
    border-right: 1px solid #334155;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid #334155;
    background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%);
  }

  .sidebar-header h1 {
    font-size: 15px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.3;
  }

  .sidebar-header p {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    margin-top: 4px;
  }

  .search-box {
    padding: 12px;
    border-bottom: 1px solid #334155;
  }

  .search-box input {
    width: 100%;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #475569;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }

  .search-box input::placeholder { color: #64748b; }
  .search-box input:focus { border-color: #818cf8; }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .sidebar-list::-webkit-scrollbar { width: 5px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

  .cat-group { margin-bottom: 4px; }

  .cat-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border: none;
    background: transparent;
    color: #94a3b8;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 6px;
    font-family: inherit;
    text-align: left;
  }

  .cat-toggle:hover { background: rgba(99,102,241,0.1); color: #c7d2fe; }
  .cat-toggle .arrow { transition: transform 0.2s; font-size: 10px; }
  .cat-toggle .arrow.open { transform: rotate(90deg); }
  .cat-toggle .count {
    margin-left: auto;
    background: #334155;
    color: #94a3b8;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 600;
  }

  .cat-items { padding-left: 8px; }

  .task-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border: none;
    background: transparent;
    color: #cbd5e1;
    font-size: 12.5px;
    cursor: pointer;
    border-radius: 6px;
    text-align: left;
    font-family: inherit;
    line-height: 1.35;
    transition: all 0.15s;
  }

  .task-btn:hover { background: rgba(99,102,241,0.15); color: #e0e7ff; }
  .task-btn.active {
    background: linear-gradient(135deg, rgba(99,102,241,0.25), rgba(139,92,246,0.2));
    color: #c7d2fe;
    font-weight: 600;
  }

  .task-btn .num {
    min-width: 26px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #334155;
    color: #94a3b8;
    font-size: 10px;
    font-weight: 700;
    border-radius: 5px;
    flex-shrink: 0;
  }

  .task-btn.active .num {
    background: #6366f1;
    color: #fff;
  }

  /* Main content */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    background: #0f172a;
  }

  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

  .main-header {
    margin-bottom: 28px;
  }

  .main-header .cat-label {
    font-size: 11px;
    font-weight: 700;
    color: #818cf8;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .main-header h2 {
    font-size: 26px;
    font-weight: 800;
    color: #f1f5f9;
    letter-spacing: -0.03em;
    line-height: 1.2;
  }

  .main-header .meta {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .meta-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 6px;
    font-size: 11.5px;
    color: #94a3b8;
  }

  .meta-tag strong { color: #e2e8f0; font-weight: 600; }

  /* Flowchart */
  .flowchart {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 20px 0;
  }

  .flow-node {
    position: relative;
    width: 100%;
    max-width: 520px;
    border-radius: 12px;
    padding: 14px 18px;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .flow-node:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .flow-node.start {
    background: linear-gradient(135deg, #059669, #10b981);
    text-align: center;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    border-radius: 28px;
    padding: 12px 20px;
    max-width: 320px;
  }

  .flow-node.end {
    background: linear-gradient(135deg, #dc2626, #ef4444);
    text-align: center;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    border-radius: 28px;
    padding: 12px 20px;
    max-width: 320px;
  }

  .flow-node.process {
    background: #1e293b;
    border: 1px solid #334155;
  }

  .flow-node.check {
    background: #1e293b;
    border: 2px solid #f59e0b;
    max-width: 420px;
  }

  .flow-node.warn {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
  }

  .flow-step-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #6366f1;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    margin-right: 10px;
    flex-shrink: 0;
    vertical-align: middle;
  }

  .flow-node .title {
    font-size: 13.5px;
    font-weight: 700;
    color: #f1f5f9;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
  }

  .flow-node .desc {
    font-size: 12px;
    color: #94a3b8;
    line-height: 1.5;
    padding-left: 34px;
  }

  .flow-node.check .title { color: #fbbf24; }
  .flow-node.check .flow-step-num { background: #f59e0b; }
  .flow-node.warn .title { color: #f87171; }
  .flow-node.warn .flow-step-num { background: #ef4444; }

  .flow-arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 36px;
    position: relative;
  }

  .flow-arrow .line {
    width: 2px;
    flex: 1;
    background: linear-gradient(to bottom, #6366f1, #818cf8);
  }

  .flow-arrow .head {
    width: 0;
    height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 8px solid #818cf8;
  }

  /* Welcome */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 70vh;
    text-align: center;
    opacity: 0.6;
  }

  .welcome-icon { font-size: 56px; margin-bottom: 16px; }
  .welcome h2 { font-size: 22px; color: #94a3b8; font-weight: 600; }
  .welcome p { font-size: 14px; color: #64748b; margin-top: 8px; }

  /* Print */
  .print-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 18px;
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 16px rgba(99,102,241,0.4);
    z-index: 99;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .print-btn:hover { background: #4f46e5; }

  /* Nav buttons */
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 32px;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
  }

  .nav-btn {
    padding: 8px 16px;
    background: #1e293b;
    border: 1px solid #334155;
    color: #cbd5e1;
    border-radius: 8px;
    font-size: 12.5px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.15s;
  }

  .nav-btn:hover { background: #334155; color: #fff; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* Mobile */
  .mobile-header {
    display: none;
    padding: 12px 16px;
    background: linear-gradient(135deg, #1e40af, #7c3aed);
    align-items: center;
    justify-content: space-between;
  }

  .mobile-header h1 { font-size: 14px; color: #fff; font-weight: 700; }

  .hamburger {
    background: none;
    border: none;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    padding: 4px;
  }

  @media (max-width: 768px) {
    .sidebar { 
      position: fixed;
      left: -320px;
      top: 0;
      height: 100%;
      z-index: 100;
      transition: left 0.3s;
    }
    .sidebar.open { left: 0; }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    .sidebar-overlay.open { display: block; }
    .mobile-header { display: flex; }
    .main { padding: 16px; }
    .main-header h2 { font-size: 20px; }
    .flow-node { max-width: 100%; }
    .print-btn { bottom: 12px; right: 12px; padding: 8px 14px; font-size: 12px; }
  }

  @media print {
    .sidebar, .mobile-header, .print-btn, .nav-buttons { display: none !important; }
    .main { padding: 20px; }
    body { background: #fff; color: #000; }
    .flow-node.process { border-color: #999; background: #f9f9f9; }
    .flow-node .title { color: #111; }
    .flow-node .desc { color: #444; }
  }
</style>
</head>

      {t:"Xây trụ gạch/BT",d:"Xây hoặc đổ BT trụ hàng rào, khoảng cách 2.5–3m",type:"process"},
      {t:"Xây thân hàng rào",d:"Xây gạch hoặc lắp lưới thép/hàng rào sắt giữa các trụ",type:"process"},
      {t:"Trát, sơn hoàn thiện",d:"Trát, bả, sơn trụ và thân hàng rào",type:"process"},
      {t:"Lắp cổng",d:"Lắp cánh cổng sắt/nhôm, bản lề, khóa",type:"process"},
      {t:"Kiểm tra",d:"Kiểm tra thẳng hàng, chắc chắn, cổng đóng mở",type:"check"}
    ]},
    { id:100, name:"Sơn sắt cổng, lan can", unit:"m²", time:"1 ngày/20–30m²", steps:[
      {t:"Làm sạch bề mặt sắt",d:"Chà bàn chải sắt, giấy nhám, loại bỏ rỉ sét, sơn cũ bong",type:"process"},
      {t:"Sơn chống rỉ 1–2 lớp",d:"Quét sơn chống rỉ, chờ khô 4h mỗi lớp",type:"process"},
      {t:"Sơn phủ hoàn thiện 2 lớp",d:"Quét/phun sơn dầu/epoxy màu, mỗi lớp cách 4–6h",type:"process"},
      {t:"Kiểm tra",d:"Kiểm tra phủ đều, không chảy, màu đồng nhất",type:"check"}
    ]},
    { id:101, name:"Vệ sinh công trình sau thi công", unit:"m²", time:"1–2 ngày/100m²", steps:[
      {t:"Thu dọn vật liệu thừa",d:"Gom vật tư thừa, phân loại tái sử dụng/bỏ",type:"process"},
      {t:"Quét dọn sàn, tường",d:"Quét bụi, gom rác xây dựng tất cả tầng",type:"process"},
      {t:"Lau chùi bề mặt hoàn thiện",d:"Lau kính, gạch, sàn bằng hóa chất chuyên dụng",type:"process"},
      {t:"Vệ sinh thiết bị vệ sinh",d:"Lau chùi bồn cầu, lavabo, sen, gương",type:"process"},
      {t:"Kiểm tra tổng thể",d:"Kiểm tra toàn bộ công trình, ghi nhận sửa chữa (nếu còn)",type:"check"}
    ]},
    { id:102, name:"Thu dọn, vận chuyển phế thải", unit:"m³", time:"0.5–1 ngày", steps:[
      {t:"Phân loại phế thải",d:"Phân loại: gạch vụn, sắt thép, gỗ, nhựa, hỗn hợp",type:"process"},
      {t:"Đóng bao, tập kết",d:"Đóng bao tải, tập kết tại vị trí quy định",type:"process"},
      {t:"Bốc xếp lên xe",d:"Dùng nhân công/xe nâng bốc lên xe tải",type:"process"},
      {t:"Vận chuyển đến bãi đổ",d:"Vận chuyển đến bãi rác xây dựng được phép",type:"process"},
      {t:"Xác nhận hoàn thành",d:"Lấy phiếu xác nhận đổ thải đúng nơi quy định",type:"check"}
    ]}
  ]}
];

function App() {
  const [selected, setSelected] = React.useState(null);
  const [search, setSearch] = React.useState('');
  const [openCats, setOpenCats] = React.useState(DATA.map((_,i) => i));
  const [sidebarOpen, setSidebarOpen] = React.useState(false);

  const allTasks = DATA.flatMap(c => c.tasks.map(t => ({...t, cat: c.cat})));

  const filtered = search.trim()
    ? allTasks.filter(t => t.name.toLowerCase().includes(search.toLowerCase()) || String(t.id).includes(search))
    : null;

  const toggleCat = (i) => {
    setOpenCats(prev => prev.includes(i) ? prev.filter(x => x !== i) : [...prev, i]);
  };

  const selectTask = (task) => {
    setSelected(task);
    setSidebarOpen(false);
  };

  const currentIndex = selected ? allTasks.findIndex(t => t.id === selected.id) : -1;
  const prevTask = currentIndex > 0 ? allTasks[currentIndex - 1] : null;
  const nextTask = currentIndex < allTasks.length - 1 ? allTasks[currentIndex + 1] : null;

  return React.createElement('div', {className:'app'},
    // Mobile header
    React.createElement('div', {className:'mobile-header'},
      React.createElement('h1', null, 'Quy trình thi công'),
      React.createElement('button', {className:'hamburger', onClick: () => setSidebarOpen(!sidebarOpen)}, '☰')
    ),
    // Overlay
    React.createElement('div', {className: 'sidebar-overlay' + (sidebarOpen ? ' open' : ''), onClick: () => setSidebarOpen(false)}),
    // Sidebar
    React.createElement('div', {className: 'sidebar' + (sidebarOpen ? ' open' : '')},
      React.createElement('div', {className:'sidebar-header'},
        React.createElement('h1', null, 'QUY TRÌNH THI CÔNG'),
        React.createElement('p', null, 'Sửa chữa cải tạo công trình dân dụng')
      ),
      React.createElement('div', {className:'search-box'},
        React.createElement('input', {
          placeholder: 'Tìm công tác...',
          value: search,
          onChange: e => setSearch(e.target.value)
        })
      ),
      React.createElement('div', {className:'sidebar-list'},
        filtered ? (
          filtered.length === 0
            ? React.createElement('p', {style:{padding:16,color:'#64748b',fontSize:13}}, 'Không tìm thấy')
            : filtered.map(t =>
                React.createElement('button', {
                  key: t.id,
                  className: 'task-btn' + (selected && selected.id === t.id ? ' active' : ''),
                  onClick: () => selectTask(t)
                },
                  React.createElement('span', {className:'num'}, t.id),
                  t.name
                )
              )
        ) : (
          DATA.map((cat, ci) =>
            React.createElement('div', {key: ci, className:'cat-group'},
              React.createElement('button', {className:'cat-toggle', onClick: () => toggleCat(ci)},
                React.createElement('span', {className: 'arrow' + (openCats.includes(ci) ? ' open' : '')}, '▶'),
                cat.cat,
                React.createElement('span', {className:'count'}, cat.tasks.length)
              ),
              openCats.includes(ci) && React.createElement('div', {className:'cat-items'},
                cat.tasks.map(t =>
                  React.createElement('button', {
                    key: t.id,
                    className: 'task-btn' + (selected && selected.id === t.id ? ' active' : ''),
                    onClick: () => selectTask(t)
                  },
                    React.createElement('span', {className:'num'}, t.id),
                    t.name
                  )
                )
              )
            )
          )
        )
      )
    ),
    // Main
    React.createElement('div', {className:'main'},
      !selected
        ? React.createElement('div', {className:'welcome'},
            React.createElement('div', {className:'welcome-icon'}, '🏗️'),
            React.createElement('h2', null, 'Chọn một công tác từ danh sách'),
            React.createElement('p', null, 'để xem sơ đồ quy trình thi công chi tiết')
          )
        : React.createElement(React.Fragment, null,
            React.createElement('div', {className:'main-header'},
              React.createElement('div', {className:'cat-label'}, selected.cat || DATA.find(c => c.tasks.some(t => t.id === selected.id))?.cat),
              React.createElement('h2', null, selected.id + '. ' + selected.name),
              React.createElement('div', {className:'meta'},
                React.createElement('span', {className:'meta-tag'}, 'ĐVT: ', React.createElement('strong', null, selected.unit)),
                React.createElement('span', {className:'meta-tag'}, 'T.gian: ', React.createElement('strong', null, selected.time)),
                React.createElement('span', {className:'meta-tag'}, 'Bước: ', React.createElement('strong', null, selected.steps.length))
              )
            ),
            React.createElement('div', {className:'flowchart'},
              React.createElement('div', {className:'flow-node start'}, '▶  BẮT ĐẦU'),
              selected.steps.map((s, i) =>
                React.createElement(React.Fragment, {key: i},
                  React.createElement('div', {className:'flow-arrow'},
                    React.createElement('div', {className:'line'}),
                    React.createElement('div', {className:'head'})
                  ),
                  React.createElement('div', {className: 'flow-node ' + s.type},
                    React.createElement('div', {className:'title'},
                      React.createElement('span', {className:'flow-step-num'}, i + 1),
                      s.t
                    ),
                    React.createElement('div', {className:'desc'}, s.d)
                  )
                )
              ),
              React.createElement('div', {className:'flow-arrow'},
                React.createElement('div', {className:'line'}),
                React.createElement('div', {className:'head'})
              ),
              React.createElement('div', {className:'flow-node end'}, '■  HOÀN THÀNH')
            ),
            React.createElement('div', {className:'nav-buttons'},
              React.createElement('button', {
                className:'nav-btn',
                disabled: !prevTask,
                onClick: () => prevTask && selectTask(prevTask)
              }, '← ' + (prevTask ? prevTask.name : '')),
              React.createElement('button', {
                className:'nav-btn',
                disabled: !nextTask,
                onClick: () => nextTask && selectTask(nextTask)
              }, (nextTask ? nextTask.name : '') + ' →')
            )
          )
    ),
    // Print button
    React.createElement('button', {className:'print-btn', onClick: () => window.print()}, '🖨️ In')
  );
}

const root = document.getElementById('app');

// Simple React-like render
const script1 = document.createElement('script');
script1.src = 'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js';
script1.onload = () => {
  const script2 = document.createElement('script');
  script2.src = 'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js';
  script2.onload = () => {
    ReactDOM.createRoot(root).render(React.createElement(App));
  };
  document.head.appendChild(script2);
};
document.head.appendChild(script1);
</script>
</body>
</html>
